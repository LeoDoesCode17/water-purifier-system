[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
lib_deps = 
  bodmer/TFT_eSPI@^2.5.43
  madhephaestus/ESP32Encoder

[env:esp32-s3-devkitc-1]
board = esp32-s3-devkitc-1
build_flags =
  ; -DBOARD_ESP32S3_DEVKITC
    -DUSER_SETUP_LOADED=1
    -DILI9488_DRIVER          ; change to your actual 3.5" driver (ILI9481/ILI9486/ILI9488/etc.)
    -DTFT_WIDTH=320
    -DTFT_HEIGHT=480
    -DTFT_MISO=38
    -DTFT_MOSI=18
    -DTFT_SCLK=21
    -DTFT_CS=15
    -DTFT_DC=17
    -DTFT_RST=16
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_FONT6=1
    -DLOAD_FONT7=1
    -DLOAD_FONT8=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1
    -DSPI_FREQUENCY=27000000
    -DSPI_READ_FREQUENCY=20000000
  -DUSE_HSPI_PORT

[env:esp32dev]
board = esp32dev
build_flags =
  ; -DBOARD_ESP32_DEVKIT
    -DUSER_SETUP_LOADED=1
    -DILI9488_DRIVER          ; change to your actual 3.5" driver (ILI9481/ILI9486/ILI9488/etc.)
    -DTFT_WIDTH=320
    -DTFT_HEIGHT=480
    -DTFT_MISO=19
    -DTFT_MOSI=23
    -DTFT_SCLK=18
    -DTFT_CS=5
    -DTFT_DC=2
    -DTFT_RST=4
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_FONT6=1
    -DLOAD_FONT7=1
    -DLOAD_FONT8=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1
    -DSPI_FREQUENCY=27000000
    -DSPI_READ_FREQUENCY=20000000